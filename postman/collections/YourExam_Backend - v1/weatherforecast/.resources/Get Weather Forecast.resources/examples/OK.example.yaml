$kind: http-example
request:
  url: "{{baseUrl}}/weatherforecast"
  method: GET
  headers:
    Accept: application/json
response:
  statusCode: 200
  statusText: OK
  headers:
    Content-Type: application/json
  body:
    type: json
    content: |-
      [
        {
          "date": "1968-05-16",
          "temperatureC": 3473,
          "summary": "string",
          "temperatureF": 6538
        },
        {
          "date": "1987-05-14",
          "temperatureC": 4170,
          "summary": "string",
          "temperatureF": 4812
        }
      ]
order: 1000
